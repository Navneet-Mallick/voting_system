<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoteSecure — Welcome</title>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="auth-wrap" style="flex-direction:column;gap:2rem">
  <div style="text-align:center">
    <img src="images/logo.svg" alt="VoteSecure Logo" style="width:90px;height:90px;filter:drop-shadow(0 4px 16px rgba(255,255,255,.2))">
    <h1 style="color:#fff;font-family:var(--font-head);font-size:2.5rem;margin:.75rem 0 .25rem">Vote<span style="color:var(--gold)">Secure</span></h1>
    <p style="color:rgba(255,255,255,.75);font-size:1rem">Transparent · Secure · Democratic</p>
  </div>

  <div style="display:flex;gap:1.25rem;flex-wrap:wrap;justify-content:center">

    <!-- Voter Card -->
    <div style="background:#fff;border-radius:16px;padding:2rem;width:260px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.25)">
      <div style="font-size:3rem;margin-bottom:.75rem">🗳️</div>
      <h2 style="font-family:var(--font-head);color:var(--primary);margin-bottom:.5rem">Voter</h2>
      <p style="color:var(--muted);font-size:.9rem;margin-bottom:1.5rem">Login or register to cast your vote in active elections.</p>
      <a href="login.html" class="btn btn-primary" style="width:100%;justify-content:center">Voter Login →</a>
    </div>

    <!-- Admin Card -->
    <div style="background:#fff;border-radius:16px;padding:2rem;width:260px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.25)">
      <div style="font-size:3rem;margin-bottom:.75rem">⚙️</div>
      <h2 style="font-family:var(--font-head);color:var(--primary);margin-bottom:.5rem">Admin</h2>
      <p style="color:var(--muted);font-size:.9rem;margin-bottom:1.5rem">Manage elections, candidates, parties and view results.</p>
      <a href="admin-login.html" class="btn btn-accent" style="width:100%;justify-content:center">Admin Login →</a>
    </div>

  </div>
</div>
<div id="toast-container"></div>
<script src="js/app.js"></script>
<script>
  getSession().then(sess => {
    if (sess.loggedIn) window.location.href = sess.role === 'admin' ? 'admin.html' : 'dashboard.html';
  });
</script>
</body>
</html>
