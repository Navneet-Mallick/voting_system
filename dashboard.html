<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoteSecure — Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <a class="brand" href="dashboard.html">
    <span class="logo"><img src="images/logo.svg" alt="VoteSecure"></span>
    Vote<span>Secure</span>
  </a>
  <div class="nav-links">
    <a href="dashboard.html" class="active">Elections</a>
    <a href="results.html">Results</a>
    <a href="admin.html" id="admin-link" style="display:none">Admin Panel</a>
    <a href="change_password.php">Change Password</a>
    <span id="nav-user" style="color:rgba(255,255,255,.7);font-size:.9rem"></span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<!-- Hero -->
<div class="hero" style="padding:2.5rem 2rem">
  <h1 style="font-size:1.75rem;margin-bottom:.5rem">Active Elections</h1>
  <p style="margin:0;opacity:.85">Cast your vote securely and transparently.</p>
</div>

<!-- Elections list -->
<div class="container">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="filterElections('all', this)">All</button>
    <button class="tab-btn" onclick="filterElections('active', this)">Active</button>
    <button class="tab-btn" onclick="filterElections('upcoming', this)">Upcoming</button>
    <button class="tab-btn" onclick="filterElections('closed', this)">Closed</button>
  </div>

  <div id="elections-grid" class="card-grid">
    <div class="empty-state"><div class="icon">⏳</div>Loading elections…</div>
  </div>
</div>

<!-- Vote Modal -->
<div class="modal-overlay" id="vote-modal" style="display:none">
  <div class="modal" style="max-width:660px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden">
    <div class="modal-header" style="flex-shrink:0">
      <div>
        <h3 id="modal-title">Cast Your Vote</h3>
        <p id="modal-progress" style="font-size:.82rem;color:var(--muted);margin-top:.25rem"></p>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="candidates-grid" style="overflow-y:auto;flex:1;padding:0 4px 1rem 0"></div>
    <div style="flex-shrink:0;padding-top:1rem;border-top:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center">
      <span id="vote-status-text" style="font-size:.85rem;color:var(--muted)"></span>
      <button class="btn btn-outline" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/app.js"></script>
<script>
let allElections = [];
let selectedCandidateId = null;
let currentElectionId   = null;
let isAdmin = false;

(async () => {
  const sess = await requireAuth();
  if (!sess) return;
  isAdmin = sess.role === 'admin';
  renderNav(sess);
  
  // Show admin link if user is admin
  if (isAdmin) {
    document.getElementById('admin-link').style.display = '';
  }
  
  loadElections();
})();

async function loadElections() {
  const res = await api('php/elections.php?action=list');
  if (!res.success) { showToast('Failed to load elections', 'error'); return; }
  allElections = res.data;
  renderElections(allElections);
}

function filterElections(status, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = status === 'all' ? allElections : allElections.filter(e => e.status === status);
  renderElections(filtered);
}

function renderElections(elections) {
  const grid = document.getElementById('elections-grid');
  if (!elections.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">📭</div>No elections found.</div>';
    return;
  }
  grid.innerHTML = elections.map((e, i) => `
    <div class="card election-card" style="animation-delay:${i * 60}ms">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem">
        ${statusBadge(e.status)}
        <small style="color:var(--muted)">#${e.election_id}</small>
      </div>
      <div class="election-title">${e.title}</div>
      <p style="font-size:.88rem;color:var(--muted);margin:.5rem 0">${e.description || 'No description.'}</p>
      <div class="election-meta">
        <span>📅 ${fmtDate(e.start_date)}</span>
        <span>⏰ ${fmtDate(e.end_date)}</span>
        <span>👥 ${e.candidate_count} candidates</span>
        <span>🗳️ ${e.vote_count} votes</span>
      </div>
      <div class="card-footer">
        <span style="font-size:.8rem;color:var(--muted)">By ${e.created_by_name}</span>
        ${e.status === 'active'
          ? (!isAdmin
              ? `<button class="btn btn-success btn-sm" onclick="openVote(${e.election_id}, '${e.title}', '${e.description || ''}')">Vote Now →</button>`
              : `<button class="btn btn-outline btn-sm" onclick="window.location='results.html?id=${e.election_id}'">View Results</button>`
            )
          : `<button class="btn btn-outline btn-sm" onclick="window.location='results.html?id=${e.election_id}'">View Results</button>`
        }
      </div>
    </div>
  `).join('');
}

async function openVote(eid, title, desc) {
  if (isAdmin) { showToast('Admins cannot cast votes.', 'error'); return; }
  currentElectionId = eid;
  selectedCandidateId = null;
  selectedPositionId = null;
  selectedCandidates = {};

  document.getElementById('vote-modal').style.display = 'flex';
  document.getElementById('modal-title').textContent = title;
  document.getElementById('candidates-grid').innerHTML = '<p style="padding:1rem;color:var(--muted)">Loading candidates…</p>';
  document.getElementById('modal-progress').textContent = '';
  document.getElementById('vote-status-text').textContent = '';

  const [vr, cr] = await Promise.all([
    api(`php/votes.php?action=check&election_id=${eid}`),
    api(`php/candidates.php?action=list&election_id=${eid}`)
  ]);

  const votedPositions = vr.votes || {};
  if (!cr.success || !cr.data.length) {
    document.getElementById('candidates-grid').innerHTML = '<p style="padding:1rem;color:var(--muted)">No candidates yet.</p>';
    return;
  }

  // Group by position
  const byPosition = {};
  cr.data.forEach(c => {
    if (!byPosition[c.position_id]) byPosition[c.position_id] = { position_id: c.position_id, position_name: c.position_name, candidates: [] };
    byPosition[c.position_id].candidates.push(c);
  });

  const positions = Object.values(byPosition);
  const totalPositions = positions.length;
  const votedCount = Object.keys(votedPositions).length;
  const remaining = totalPositions - votedCount;

  document.getElementById('modal-progress').textContent = `${votedCount} of ${totalPositions} positions voted`;
  document.getElementById('vote-status-text').textContent = remaining > 0 ? `${remaining} position(s) remaining` : '✅ All positions voted';

  let html = '';
  positions.forEach((pos, idx) => {
    const alreadyVoted = votedPositions[pos.position_id];
    html += `
      <div class="position-section" data-position-id="${pos.position_id}" style="padding:1.25rem 0;${idx > 0 ? 'border-top:2px solid #e5e7eb;' : ''}">
        <div style="display:flex;align-items:center;gap:.6rem;margin-bottom:1rem">
          <span style="background:var(--primary);color:#fff;border-radius:50%;width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0">${idx + 1}</span>
          <h4 style="margin:0;color:var(--primary);font-size:1rem">${pos.position_name}</h4>
          ${alreadyVoted ? '<span style="margin-left:auto;background:#d1fae5;color:#065f46;padding:.2rem .6rem;border-radius:20px;font-size:.75rem;font-weight:700">✓ VOTED</span>' : '<span style="margin-left:auto;background:#fef3c7;color:#92400e;padding:.2rem .6rem;border-radius:20px;font-size:.75rem;font-weight:700">PENDING</span>'}
        </div>`;

    if (alreadyVoted) {
      html += `
        <div style="background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:10px;padding:1rem;display:flex;align-items:center;gap:.75rem">
          <span style="font-size:1.5rem">✅</span>
          <div>
            <div style="font-weight:700">${alreadyVoted.candidate_name}</div>
            <div style="font-size:.85rem;color:var(--muted)">🏛️ ${alreadyVoted.party_name}</div>
          </div>
        </div>`;
    } else {
      html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">`;
      pos.candidates.forEach((c, i) => {
        html += `
          <div class="candidate-card" data-position-id="${pos.position_id}" id="cand-${c.candidate_id}"
               style="animation-delay:${i * 50}ms;cursor:pointer"
               onclick="selectCandidate(${c.candidate_id}, ${pos.position_id}, this)">
            <div class="check-mark">✓</div>
            <div class="candidate-name">${c.full_name}</div>
            <div class="candidate-party">🏛️ ${c.party_name}</div>
            <div class="candidate-bio" style="font-size:.82rem;color:var(--muted);margin-top:.3rem">${c.bio || ''}</div>
          </div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  });

  document.getElementById('candidates-grid').innerHTML = html;
}

let selectedPositionId = null;
let selectedCandidates = {};

function selectCandidate(cid, posId, el) {
  // Deselect others in same position only
  document.querySelectorAll(`.candidate-card[data-position-id="${posId}"]`).forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedCandidates[posId] = cid;
  selectedCandidateId = cid;
  selectedPositionId = posId;

  // Show confirm button inside the position section
  const section = document.querySelector(`.position-section[data-position-id="${posId}"]`);
  let confirmBtn = section.querySelector('.confirm-position-btn');
  if (!confirmBtn) {
    confirmBtn = document.createElement('button');
    confirmBtn.className = 'btn btn-success confirm-position-btn';
    confirmBtn.style.cssText = 'margin-top:.75rem;width:100%';
    confirmBtn.onclick = () => castVote(posId);
    section.appendChild(confirmBtn);
  }
  confirmBtn.innerHTML = `✓ Confirm vote for <strong>${el.querySelector('.candidate-name').textContent}</strong>`;
}

async function castVote(posId) {
  const cid = selectedCandidates[posId];
  if (!cid) return;

  const btn = document.querySelector(`.position-section[data-position-id="${posId}"] .confirm-position-btn`);
  if (btn) { btn.innerHTML = '<span class="spinner"></span> Submitting…'; btn.disabled = true; }

  try {
    const res = await api('php/votes.php?action=cast', { election_id: currentElectionId, candidate_id: cid });
    if (res && res.success) {
      showToast(res.message, 'success');
      delete selectedCandidates[posId];
      // Reload modal to reflect voted state
      await openVote(currentElectionId, document.getElementById('modal-title').textContent, '');
    } else {
      showToast(res?.message || 'Failed to cast vote', 'error');
      if (btn) { btn.innerHTML = '✓ Confirm Vote'; btn.disabled = false; }
    }
  } catch (e) {
    showToast('Network error. Please try again.', 'error');
    if (btn) { btn.innerHTML = '✓ Confirm Vote'; btn.disabled = false; }
  }
}

function closeModal() {
  document.getElementById('vote-modal').style.display = 'none';
}
</script>
</body>
</html>
