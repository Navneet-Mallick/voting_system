<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoteSecure — Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <a class="brand" href="dashboard.html">
    <span class="logo"><img src="images/logo.svg" alt="VoteSecure"></span>
    Vote<span>Secure</span>
  </a>
  <div class="nav-links">
    <a href="dashboard.html" class="active">Elections</a>
    <a href="results.html">Results</a>
    <a href="admin.html" id="admin-link" style="display:none">Admin Panel</a>
    <a href="change_password.php">Change Password</a>
    <span id="nav-user" style="color:rgba(255,255,255,.7);font-size:.9rem"></span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<!-- Hero -->
<div class="hero" style="padding:2.5rem 2rem">
  <h1 style="font-size:1.75rem;margin-bottom:.5rem">Active Elections</h1>
  <p style="margin:0;opacity:.85">Cast your vote securely and transparently.</p>
</div>

<!-- Elections list -->
<div class="container">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="filterElections('all', this)">All</button>
    <button class="tab-btn" onclick="filterElections('active', this)">Active</button>
    <button class="tab-btn" onclick="filterElections('upcoming', this)">Upcoming</button>
    <button class="tab-btn" onclick="filterElections('closed', this)">Closed</button>
  </div>

  <div id="elections-grid" class="card-grid">
    <div class="empty-state"><div class="icon">⏳</div>Loading elections…</div>
  </div>
</div>

<!-- Vote Modal -->
<div class="modal-overlay" id="vote-modal" style="display:none">
  <div class="modal" style="max-width:650px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden">
    <div class="modal-header" style="flex-shrink:0">
      <h3 id="modal-title">Cast Your Vote</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <p id="modal-desc" style="color:var(--muted);margin-bottom:1rem;font-size:.9rem;flex-shrink:0"></p>
    <div id="candidates-grid" class="card-grid" style="grid-template-columns:1fr 1fr;overflow-y:auto;flex:1;padding-right:10px;margin-bottom:1rem"></div>
    <div style="flex-shrink:0;display:flex;justify-content:flex-end;gap:.75rem;padding-top:1rem;border-top:1px solid #e5e7eb">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-success" id="cast-btn" disabled onclick="castVote()">
        ✓ Confirm Vote
      </button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/app.js"></script>
<script>
let allElections = [];
let selectedCandidateId = null;
let currentElectionId   = null;
let isAdmin = false;

(async () => {
  const sess = await requireAuth();
  if (!sess) return;
  isAdmin = sess.role === 'admin';
  renderNav(sess);
  
  // Show admin link if user is admin
  if (isAdmin) {
    document.getElementById('admin-link').style.display = '';
  }
  
  loadElections();
})();

async function loadElections() {
  const res = await api('php/elections.php?action=list');
  if (!res.success) { showToast('Failed to load elections', 'error'); return; }
  allElections = res.data;
  renderElections(allElections);
}

function filterElections(status, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = status === 'all' ? allElections : allElections.filter(e => e.status === status);
  renderElections(filtered);
}

function renderElections(elections) {
  const grid = document.getElementById('elections-grid');
  if (!elections.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">📭</div>No elections found.</div>';
    return;
  }
  grid.innerHTML = elections.map((e, i) => `
    <div class="card election-card" style="animation-delay:${i * 60}ms">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem">
        ${statusBadge(e.status)}
        <small style="color:var(--muted)">#${e.election_id}</small>
      </div>
      <div class="election-title">${e.title}</div>
      <p style="font-size:.88rem;color:var(--muted);margin:.5rem 0">${e.description || 'No description.'}</p>
      <div class="election-meta">
        <span>📅 ${fmtDate(e.start_date)}</span>
        <span>⏰ ${fmtDate(e.end_date)}</span>
        <span>👥 ${e.candidate_count} candidates</span>
        <span>🗳️ ${e.vote_count} votes</span>
      </div>
      <div class="card-footer">
        <span style="font-size:.8rem;color:var(--muted)">By ${e.created_by_name}</span>
        ${e.status === 'active'
          ? (!isAdmin
              ? `<button class="btn btn-success btn-sm" onclick="openVote(${e.election_id}, '${e.title}', '${e.description || ''}')">Vote Now →</button>`
              : `<button class="btn btn-outline btn-sm" onclick="window.location='results.html?id=${e.election_id}'">View Results</button>`
            )
          : `<button class="btn btn-outline btn-sm" onclick="window.location='results.html?id=${e.election_id}'">View Results</button>`
        }
      </div>
    </div>
  `).join('');
}

async function openVote(eid, title, desc) {
  if (isAdmin) {
    showToast('Admins cannot cast votes.', 'error');
    return;
  }
  currentElectionId   = eid;
  selectedCandidateId = null;
  document.getElementById('vote-modal').style.display = 'flex';
  document.getElementById('modal-title').textContent  = title;
  document.getElementById('modal-desc').textContent   = desc;
  document.getElementById('cast-btn').disabled        = true;
  document.getElementById('candidates-grid').innerHTML = '<p>Loading candidates…</p>';

  // Check which positions already voted
  const vr = await api(`php/votes.php?action=check&election_id=${eid}`);
  const votedPositions = vr.votes || {};

  const cr = await api(`php/candidates.php?action=list&election_id=${eid}`);
  if (!cr.success || !cr.data.length) {
    document.getElementById('candidates-grid').innerHTML = '<p>No candidates yet.</p>';
    return;
  }

  // Group candidates by position
  const byPosition = {};
  cr.data.forEach(c => {
    if (!byPosition[c.position_id]) {
      byPosition[c.position_id] = {
        position_id: c.position_id,
        position_name: c.position_name,
        candidates: []
      };
    }
    byPosition[c.position_id].candidates.push(c);
  });

  // Render grouped by position
  let html = '';
  Object.values(byPosition).forEach((pos, idx) => {
    const alreadyVoted = votedPositions[pos.position_id];
    const marginTop = idx === 0 ? '0' : '1.5rem';
    html += `<div class="position-section" data-position-id="${pos.position_id}" style="grid-column:1/-1;margin-top:${marginTop};${idx > 0 ? 'border-top:1px solid #e5e7eb;' : ''}padding-top:${idx > 0 ? '1rem' : '0'}">
      <h4 style="margin-bottom:.75rem;color:var(--primary);font-size:1.1rem">${pos.position_name}</h4>`;
    
    if (alreadyVoted) {
      html += `<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:1rem;text-align:center;margin-bottom:.5rem">
        <p style="margin:0">✅ You voted for <strong>${alreadyVoted.candidate_name}</strong> (${alreadyVoted.party_name})</p>
      </div>`;
    } else {
      html += '<div class="candidates-container" style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.5rem">';
      pos.candidates.forEach((c, i) => {
        html += `
          <div class="candidate-card" data-position-id="${pos.position_id}" style="animation-delay:${i * 60}ms" 
               onclick="selectCandidate(${c.candidate_id}, ${pos.position_id}, this)" 
               id="cand-${c.candidate_id}">
            <div class="check-mark">✓</div>
            <div class="candidate-name">${c.full_name}</div>
            <div class="candidate-party">🏛️ ${c.party_name}</div>
            <div class="candidate-bio">${c.bio || ''}</div>
          </div>`;
      });
      html += '</div>';
    }
    html += '</div>';
  });

  document.getElementById('candidates-grid').innerHTML = html;
}

let selectedPositionId = null;
let selectedCandidates = {}; // Track selections per position

function selectCandidate(cid, posId, el) {
  // Clear selection only for candidates in THIS position
  document.querySelectorAll(`.candidate-card[data-position-id="${posId}"]`).forEach(c => {
    c.classList.remove('selected');
  });
  
  // Select this candidate
  el.classList.add('selected');
  selectedCandidates[posId] = cid;
  selectedCandidateId = cid;
  selectedPositionId = posId;
  document.getElementById('cast-btn').disabled = false;
}

async function castVote() {
  if (!selectedCandidateId) return;
  const btn = document.getElementById('cast-btn');
  btn.innerHTML = '<span class="spinner"></span> Submitting…';
  btn.disabled  = true;

  const res = await api('php/votes.php?action=cast', {
    election_id:  currentElectionId,
    candidate_id: selectedCandidateId
  });
  if (res.success) {
    showToast(res.message, 'success');
    closeModal();
    loadElections();
  } else {
    showToast(res.message, 'error');
    btn.innerHTML = '✓ Confirm Vote';
    btn.disabled  = false;
  }
}

function closeModal() {
  document.getElementById('vote-modal').style.display = 'none';
}
</script>
</body>
</html>
