<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoteSecure — Results</title>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav class="navbar">
  <a class="brand" href="dashboard.html">
    <span class="logo"><img src="images/logo.svg" alt="VoteSecure"></span>
    Vote<span>Secure</span>
  </a>
  <div class="nav-links">
    <a href="dashboard.html">Elections</a>
    <a href="results.html" class="active">Results</a>
    <a href="admin.html" id="admin-link" style="display:none">Admin Panel</a>
    <a href="change_password.php">Change Password</a>
    <span id="nav-user" style="color:rgba(255,255,255,.7);font-size:.9rem"></span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h2>Election Results</h2>
    <p>Live vote counts and winner declarations.</p>
  </div>

  <!-- Election picker -->
  <div class="card" style="margin-bottom:2rem">
    <div class="form-group" style="margin:0">
      <label>Select Election</label>
      <select class="form-control" id="election-select" onchange="loadResults(this.value)">
        <option value="">— Choose an election —</option>
      </select>
    </div>
  </div>

  <!-- Result type tabs -->
  <div class="tab-bar" id="result-tabs" style="display:none">
    <button class="tab-btn active" onclick="showResultType('position', this)">📍 By Position</button>
    <button class="tab-btn" onclick="showResultType('party', this)">🏛️ By Party</button>
    <button class="tab-btn" onclick="showResultType('candidate', this)">👤 By Candidate</button>
  </div>

  <!-- Results panel -->
  <div id="results-panel"></div>
</div>

<div id="toast-container"></div>
<script src="js/app.js"></script>
<script>
let currentElectionId = null;
let currentResultType = 'position';
let refreshInterval = null;

(async () => {
  const sess = await requireAuth();
  if (!sess) return;
  renderNav(sess);
  
  // Show admin link if user is admin
  if (sess.role === 'admin') {
    document.getElementById('admin-link').style.display = '';
  }
  
  loadElections();

  // Check URL param
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if (id) {
    document.getElementById('election-select').value = id;
    loadResults(id);
  }
})();

async function loadElections() {
  const res = await api('php/elections.php?action=list');
  if (!res.success) return;
  const sel = document.getElementById('election-select');
  res.data.forEach(e => {
    const opt = document.createElement('option');
    opt.value       = e.election_id;
    opt.textContent = `${e.title} (${e.status})`;
    sel.appendChild(opt);
  });
}

function showResultType(type, btn) {
  currentResultType = type;
  document.querySelectorAll('#result-tabs .tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadResults(currentElectionId);
}

async function loadResults(eid) {
  if (!eid) {
    document.getElementById('results-panel').innerHTML = '';
    document.getElementById('result-tabs').style.display = 'none';
    if (refreshInterval) clearInterval(refreshInterval);
    return;
  }
  
  currentElectionId = eid;
  document.getElementById('result-tabs').style.display = 'flex';
  
  // Clear previous interval
  if (refreshInterval) clearInterval(refreshInterval);
  
  // Load initial results
  await fetchAndDisplayResults();
  
  // Set up auto-refresh every 5 seconds
  refreshInterval = setInterval(fetchAndDisplayResults, 5000);
}

async function fetchAndDisplayResults() {
  if (currentResultType === 'position') {
    await loadPositionResults();
  } else if (currentResultType === 'party') {
    await loadPartyResults();
  } else {
    await loadCandidateResults();
  }
}

async function loadPositionResults() {
  const panel = document.getElementById('results-panel');
  panel.innerHTML = '<div class="empty-state"><span class="spinner" style="border-color:var(--primary);border-top-color:transparent"></span></div>';

  const res = await api(`php/votes.php?action=results&election_id=${currentElectionId}`);
  if (!res.success) { showToast('Failed to load results', 'error'); return; }

  const positions = res.data;
  if (!positions.length) {
    panel.innerHTML = '<div class="empty-state"><div class="icon">📭</div>No results yet.</div>';
    return;
  }

  let html = '';
  positions.forEach((pos, idx) => {
    const winner = pos.candidates[0];
    html += `
      <div class="card" style="margin-bottom:1.5rem;animation:slideIn .3s ease ${idx * 100}ms both">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
          <h3 style="margin:0">${pos.position_name}</h3>
          <span style="color:var(--muted);font-size:.9rem">${pos.total_votes} votes</span>
        </div>
        ${pos.total_votes > 0 && winner ? `
          <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:.75rem 1rem;margin-bottom:1rem">
            <div style="font-size:.75rem;text-transform:uppercase;font-weight:700;color:var(--success);letter-spacing:.05em">🏆 Winner</div>
            <div style="font-weight:700;font-size:1.1rem">${winner.full_name}</div>
            <div style="font-size:.85rem;color:var(--muted)">${winner.party_name} · ${winner.vote_count} votes (${winner.percentage}%)</div>
          </div>` : ''}
        ${pos.candidates.map((c, i) => `
          <div class="result-row ${i === 0 && pos.total_votes > 0 ? 'winner' : ''}" style="animation-delay:${i * 80}ms">
            <div class="result-header">
              <span>${i === 0 && pos.total_votes > 0 ? '🏆 ' : ''}${c.full_name} <span style="font-weight:400;color:var(--muted);font-size:.85rem">(${c.party_name})</span></span>
              <span>${c.vote_count} votes · ${c.percentage}%</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width:${c.percentage}%"></div>
            </div>
          </div>
        `).join('')}
      </div>`;
  });

  panel.innerHTML = html;
}

async function loadPartyResults() {
  const panel = document.getElementById('results-panel');
  panel.innerHTML = '<div class="empty-state"><span class="spinner" style="border-color:var(--primary);border-top-color:transparent"></span></div>';

  const res = await api(`php/votes.php?action=party_results&election_id=${currentElectionId}`);
  if (!res.success) { showToast('Failed to load results', 'error'); return; }

  const parties = res.data;
  const total = res.total_votes;

  let html = `
    <div class="card">
      <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem">
        <div style="flex:1">
          <h3 style="margin-bottom:.25rem">Party-wise Results</h3>
          <p style="color:var(--muted);font-size:.9rem;margin:0">Total votes cast: <strong>${total}</strong></p>
        </div>
        ${total > 0 && parties[0] ? `
          <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:.75rem 1.25rem;text-align:center">
            <div style="font-size:.75rem;text-transform:uppercase;font-weight:700;color:var(--success);letter-spacing:.05em">🏆 Leading Party</div>
            <div style="font-weight:700;font-size:1.1rem">${parties[0].party_name}</div>
            <div style="font-size:.85rem;color:var(--muted)">${parties[0].total_votes} votes · ${parties[0].percentage}%</div>
          </div>` : ''}
      </div>
      ${parties.map((p, i) => `
        <div class="result-row ${i === 0 && total > 0 ? 'winner' : ''}" style="animation-delay:${i * 80}ms">
          <div class="result-header">
            <span>${i === 0 && total > 0 ? '🏆 ' : ''}${p.party_name}</span>
            <span>${p.total_votes} votes · ${p.percentage}%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${p.percentage}%"></div>
          </div>
        </div>
      `).join('')}
    </div>`;

  panel.innerHTML = html;
}

async function loadCandidateResults() {
  const panel = document.getElementById('results-panel');
  panel.innerHTML = '<div class="empty-state"><span class="spinner" style="border-color:var(--primary);border-top-color:transparent"></span></div>';

  const res = await api(`php/votes.php?action=candidate_results&election_id=${currentElectionId}`);
  if (!res.success) { showToast('Failed to load results', 'error'); return; }

  const candidates = res.data;
  const total = res.total_votes;

  let html = `
    <div class="card">
      <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem">
        <div style="flex:1">
          <h3 style="margin-bottom:.25rem">Individual Candidate Results</h3>
          <p style="color:var(--muted);font-size:.9rem;margin:0">Total votes cast: <strong>${total}</strong></p>
        </div>
        ${total > 0 && candidates[0] ? `
          <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:.75rem 1.25rem;text-align:center">
            <div style="font-size:.75rem;text-transform:uppercase;font-weight:700;color:var(--success);letter-spacing:.05em">🏆 Top Candidate</div>
            <div style="font-weight:700;font-size:1.1rem">${candidates[0].full_name}</div>
            <div style="font-size:.85rem;color:var(--muted)">${candidates[0].party_name} · ${candidates[0].vote_count} votes</div>
          </div>` : ''}
      </div>
      ${candidates.map((c, i) => `
        <div class="result-row ${i === 0 && total > 0 ? 'winner' : ''}" style="animation-delay:${i * 80}ms">
          <div class="result-header">
            <span>${i === 0 && total > 0 ? '🏆 ' : ''}${c.full_name} <span style="font-weight:400;color:var(--muted);font-size:.85rem">(${c.party_name} - ${c.position_name})</span></span>
            <span>${c.vote_count} votes · ${c.percentage}%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${c.percentage}%"></div>
          </div>
        </div>
      `).join('')}
    </div>`;

  panel.innerHTML = html;
}

// Clean up interval when leaving page
window.addEventListener('beforeunload', () => {
  if (refreshInterval) clearInterval(refreshInterval);
});
</script>
</body>
</html>
