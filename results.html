<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoteSecure — Results</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav class="navbar">
  <a class="brand" href="dashboard.html">🗳️ Vote<span>Secure</span></a>
  <div class="nav-links">
    <a href="dashboard.html">Elections</a>
    <a href="results.html" class="active">Results</a>
    <span id="nav-user" style="color:rgba(255,255,255,.7);font-size:.9rem"></span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h2>Election Results</h2>
    <p>Live vote counts and winner declarations.</p>
  </div>

  <!-- Election picker -->
  <div class="card" style="margin-bottom:2rem">
    <div class="form-group" style="margin:0">
      <label>Select Election</label>
      <select class="form-control" id="election-select" onchange="loadResults(this.value)">
        <option value="">— Choose an election —</option>
      </select>
    </div>
  </div>

  <!-- Results panel -->
  <div id="results-panel"></div>
</div>

<div id="toast-container"></div>
<script src="js/app.js"></script>
<script>
(async () => {
  const sess = await requireAuth();
  if (!sess) return;
  renderNav(sess);
  loadElections();

  // Check URL param
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if (id) {
    document.getElementById('election-select').value = id;
    loadResults(id);
  }
})();

async function loadElections() {
  const res = await api('php/elections.php?action=list');
  if (!res.success) return;
  const sel = document.getElementById('election-select');
  res.data.forEach(e => {
    const opt = document.createElement('option');
    opt.value       = e.election_id;
    opt.textContent = `${e.title} (${e.status})`;
    sel.appendChild(opt);
  });
}

async function loadResults(eid) {
  const panel = document.getElementById('results-panel');
  if (!eid) { panel.innerHTML = ''; return; }
  panel.innerHTML = '<div class="empty-state"><span class="spinner" style="border-color:var(--primary);border-top-color:transparent"></span></div>';

  const res = await api(`php/votes.php?action=results&election_id=${eid}`);
  if (!res.success) { showToast('Failed to load results', 'error'); return; }

  const data        = res.data;
  const total       = res.total_votes;
  const winner      = data[0];
  const isWinner    = i => i === 0 && total > 0;

  panel.innerHTML = `
    <div class="card" style="margin-bottom:1.5rem">
      <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
        <div style="flex:1">
          <h3 style="margin-bottom:.25rem">📊 Live Tally</h3>
          <p style="color:var(--muted);font-size:.9rem">Total votes cast: <strong>${total}</strong></p>
        </div>
        ${total > 0 && winner ? `
          <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:.75rem 1.25rem;text-align:center">
            <div style="font-size:.75rem;text-transform:uppercase;font-weight:700;color:var(--success);letter-spacing:.05em">🏆 Leading</div>
            <div style="font-weight:700;font-size:1.1rem">${winner.full_name}</div>
            <div style="font-size:.85rem;color:var(--muted)">${winner.party_name} · ${winner.percentage}%</div>
          </div>` : ''}
      </div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:1.5rem">Candidate Results</h3>
      ${data.map((c, i) => `
        <div class="result-row ${isWinner(i) ? 'winner' : ''}" style="animation-delay:${i * 80}ms">
          <div class="result-header">
            <span>${isWinner(i) ? '🏆 ' : ''}${c.full_name} <span style="font-weight:400;color:var(--muted);font-size:.85rem">(${c.party_name})</span></span>
            <span>${c.vote_count} votes · ${c.percentage}%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:0%; transition-delay:${i * 80}ms" data-width="${c.percentage}%"></div>
          </div>
        </div>
      `).join('')}
      ${!data.length ? '<div class="empty-state"><div class="icon">📭</div>No candidates found.</div>' : ''}
    </div>
  `;

  // Animate bars
  setTimeout(() => {
    document.querySelectorAll('.progress-fill').forEach(bar => {
      bar.style.width = bar.dataset.width;
    });
  }, 100);
}
</script>
</body>
</html>
