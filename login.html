<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoteSecure — Voter Login</title>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">
      <img src="images/logo.svg" alt="VoteSecure Logo" class="logo-img">
      <h1>Vote<span>Secure</span></h1>
      <p>Voter Portal</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login"    onclick="switchTab('login')">Login</button>
      <button class="auth-tab"        id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <form id="login-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" class="form-control" id="login-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-control" id="login-pass" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%" id="login-btn">Sign In</button>
    </form>

    <!-- Register Form -->
    <form id="register-form" style="display:none">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" class="form-control" id="reg-name" placeholder="Your full name" required>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" class="form-control" id="reg-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-control" id="reg-pass" placeholder="Min 6 characters" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%" id="reg-btn">Create Account</button>
    </form>

    <p style="text-align:center;margin-top:1.5rem;font-size:.85rem;color:var(--muted)">
      <a href="index.html" style="color:var(--primary)">← Back to Home</a>
    </p>
  </div>
</div>
<div id="toast-container"></div>
<script src="js/app.js"></script>
<script>
  getSession().then(sess => {
    if (sess.loggedIn) window.location.href = sess.role === 'admin' ? 'admin.html' : 'dashboard.html';
  });

  function switchTab(tab) {
    document.getElementById('login-form').style.display    = tab === 'login'    ? '' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
    document.getElementById('tab-login').classList.toggle('active',    tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  }

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    btn.innerHTML = '<span class="spinner"></span> Signing in...';
    btn.disabled = true;
    const res = await api('php/auth.php', {
      action: 'login',
      email:    document.getElementById('login-email').value,
      password: document.getElementById('login-pass').value
    });
    btn.innerHTML = 'Sign In'; btn.disabled = false;
    if (res.success) {
      if (res.role === 'admin') {
        showToast('This portal is for voters only.', 'error');
        return;
      }
      showToast('Welcome, ' + res.name + '!', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 800);
    } else {
      showToast(res.message, 'error');
    }
  });

  document.getElementById('register-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('reg-btn');
    btn.innerHTML = '<span class="spinner"></span> Creating...';
    btn.disabled = true;
    const res = await api('php/auth.php', {
      action:    'register',
      full_name: document.getElementById('reg-name').value,
      email:     document.getElementById('reg-email').value,
      password:  document.getElementById('reg-pass').value
    });
    btn.innerHTML = 'Create Account'; btn.disabled = false;
    if (res.success) {
      showToast(res.message, 'success');
      switchTab('login');
    } else {
      showToast(res.message, 'error');
    }
  });
</script>
</body>
</html>
