<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoteSecure — Admin Login</title>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">
      <img src="images/logo.svg" alt="VoteSecure Logo" class="logo-img">
      <h1>Vote<span>Secure</span></h1>
      <p style="display:inline-block;background:var(--gold);color:var(--ink);padding:.2rem .75rem;border-radius:20px;font-size:.85rem;font-weight:700">Admin Portal</p>
    </div>

    <form id="admin-login-form">
      <div class="form-group">
        <label>Admin Email</label>
        <input type="email" class="form-control" id="admin-email" placeholder="admin@vote.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-control" id="admin-pass" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-accent" style="width:100%" id="admin-btn">Admin Sign In</button>
    </form>

    <p style="text-align:center;margin-top:1.5rem;font-size:.85rem;color:var(--muted)">
      <a href="index.html" style="color:var(--primary)">← Back to Home</a>
    </p>
  </div>
</div>
<div id="toast-container"></div>
<script src="js/app.js"></script>
<script>
  getSession().then(sess => {
    if (sess.loggedIn) window.location.href = sess.role === 'admin' ? 'admin.html' : 'dashboard.html';
  });

  document.getElementById('admin-login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('admin-btn');
    btn.innerHTML = '<span class="spinner"></span> Signing in...';
    btn.disabled = true;
    const res = await api('php/auth.php', {
      action:   'login',
      email:    document.getElementById('admin-email').value,
      password: document.getElementById('admin-pass').value
    });
    btn.innerHTML = 'Admin Sign In'; btn.disabled = false;
    if (res.success) {
      if (res.role !== 'admin') {
        showToast('Access denied. Admin credentials required.', 'error');
        return;
      }
      showToast('Welcome, ' + res.name + '!', 'success');
      setTimeout(() => window.location.href = 'admin.html', 800);
    } else {
      showToast(res.message, 'error');
    }
  });
</script>
</body>
</html>
